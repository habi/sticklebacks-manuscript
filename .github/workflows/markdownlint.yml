name: Lint Markdown files in content folder

on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            content/*.md
            !content/00*.md
            !content/90*.md
          config: |
            {
              "MD013": false,
              "MD041": false
            }
