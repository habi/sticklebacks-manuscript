name: Lint Markdown most files in content

on:
  pull_request:
  push:

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create markdownlint config
        run: |
          cat > .markdownlint-cli2.json <<'EOF'
          {
            "config": {
              "MD013": false,
              "MD041": false
            }
          }
          EOF

      - uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        with:
          globs: |
            content/*.md
            !content/00.front-matter.md
            !content/07.contributions.md
            !content/90.back-matter.md
          config: .markdownlint-cli2.json
